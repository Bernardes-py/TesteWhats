<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, Arial, sans-serif; color:#111; }
    .app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
    .sidebar { border-right: 1px solid #ddd; display:flex; flex-direction:column; }
    .header { padding:10px; border-bottom:1px solid #eee; font-weight:600; }
    .contacts { flex:1; overflow-y:auto; }
    .contact { padding:10px; border-bottom:1px solid #f0f0f0; cursor:pointer; }
    .contact:hover { background:#fafafa; }
    .contact .small { font-size:12px; color:#666; }
    .main { display:flex; flex-direction:column; min-height:0; overflow:hidden; }
    .main .header { position: sticky; top: 0; background:#fff; z-index: 12; }
    .main .toolbar { position: sticky; top: 42px; background:#fff; z-index: 11; }
    .messages { flex:1; overflow-y:auto; padding:12px; padding-bottom:96px; background:#fbfbfb; position:relative; }
    .msg { max-width: 70%; padding:8px 10px; border-radius:10px; margin:6px 0; word-break: break-word; position:relative; }
    .msg.me { margin-left:auto; background:#dcf8c6; }
    .msg.them { margin-right:auto; background:#fff; border: 1px solid #eee; }
    .msg .time { display:block; font-size:10px; color:#666; text-align:right; margin-top:4px; }
    .msg img { max-width:100%; border-radius:8px; border:1px solid #ddd; }
    .composer { border-top:1px solid #ddd; padding:8px; display:flex; gap:8px; position: sticky; bottom: 0; background:#fff; z-index: 13; }
    .scroll-bottom { position: absolute; right: 12px; bottom: 110px; background:#111; color:#fff; border:none; padding:8px 10px; border-radius:16px; font-size:12px; display:none; opacity:0.9; }
    .composer input, .composer textarea { width:100%; padding:8px; border:1px solid #ddd; border-radius:6px; }
    .toolbar { padding:8px; border-bottom:1px solid #eee; display:flex; gap:8px; align-items:center; }
    button { padding:8px 12px; cursor:pointer; }
    .row { display:flex; gap:8px; }
    .status { position:absolute; right:8px; bottom:4px; font-size:10px; color:#555; }
    .pending { opacity: 0.7; }
    .spinner { width:10px; height:10px; border:2px solid #bbb; border-top-color:#666; border-radius:50%; display:inline-block; animation:spin 1s linear infinite; vertical-align:middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position:fixed; left:12px; bottom:12px; background:#111; color:#fff; padding:8px 12px; border-radius:6px; font-size:12px; opacity:0.95; }
    .log { font-size:11px; color:#444; padding:6px; border-top:1px solid #eee; max-height:120px; overflow:auto; background:#fafafa }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="header">Contatos</div>
      <div class="toolbar" style="flex-wrap:wrap">
        <input id="filter" placeholder="Filtrar por número..." />
        <button id="reload-contacts">Atualizar</button>
        <input id="new-phone" placeholder="Novo número (ex.: 5511999999999)" style="flex:1" />
        <button id="start-chat">Iniciar</button>
      </div>
      <div class="contacts" id="contacts"></div>
    </div>
    <div class="main">
      <div class="header" id="chat-title">Selecionar um contato</div>
      <div class="toolbar">
        <button id="btn-clear" disabled>Excluir histórico</button>
        <button id="btn-load-more" disabled>Carregar mais</button>
        <span id="info-count" style="margin-left:auto;font-size:12px;color:#666"></span>
      </div>
      <div class="messages" id="messages">
        <button id="btn-scroll-bottom" class="scroll-bottom">Ir para o fim</button>
      </div>
      <div id="toast" class="toast" style="display:none"></div>
      <div class="composer">
        <input id="image" placeholder="URL/Base64 da imagem (opcional)" />
        <textarea id="text" rows="2" placeholder="Digite uma mensagem"></textarea>
        <button id="send">Enviar</button>
      </div>
      <div class="toolbar" style="border-top:1px solid #eee">
        <label style="font-size:12px;display:flex;align-items:center;gap:6px;">
          <input id="toggle-log" type="checkbox" />
          Mostrar log
        </label>
      </div>
      <div class="log" id="log" style="display:none"></div>
    </div>
  </div>
  <script>
    const S = {
      contact: null,
      beforeTs: null,
      items: [],
      sending: false,
      log: [],
      pageSize: 30,
      loadingMore: false
    };
    const fmt = ts => new Date(ts).toLocaleString();
    function toast(msg, ms=3000){ const el=document.getElementById('toast'); el.textContent=msg; el.style.display='block'; setTimeout(()=>el.style.display='none', ms); }
    function addLog(s){ S.log.push(`[${new Date().toLocaleTimeString()}] ${s}`); S.log = S.log.slice(-200); document.getElementById('log').textContent = S.log.join('\n'); }
    async function api(u, opt) {
      const r = await fetch(u, { headers:{'Content-Type':'application/json'}, ...(opt||{}) });
      const t = await r.text();
      try { return { ok:r.ok, status:r.status, data: JSON.parse(t) }; } catch { return { ok:r.ok, status:r.status, data:t }; }
    }
    function drawContacts(list) {
      const cont = document.getElementById('contacts');
      const q = document.getElementById('filter').value.trim();
      const filtered = q ? list.filter(c => c.phone.includes(q)) : list;
      cont.innerHTML = filtered.map(c => `
        <div class="contact" data-phone="${c.phone}">
          <div>${c.phone}</div>
          <div class="small">${fmt(c.lastTs)} — R:${c.receivedCount} S:${c.sentCount}</div>
        </div>
      `).join('') || '<div style="padding:12px;color:#666">Sem contatos</div>';
      cont.querySelectorAll('.contact').forEach(el => {
        el.addEventListener('click', () => openChat(el.getAttribute('data-phone')));
      });
    }
    async function loadContacts() {
      const r = await api('/api/chat/contacts');
      if (r.ok) drawContacts(r.data.contacts || []);
    }
    function normalizePhone(p) { return (p || '').replace(/\D+/g,'').trim(); }
    function atBottom(box) {
      const delta = box.scrollHeight - box.clientHeight - box.scrollTop;
      return delta <= 16;
    }
    function drawMessages(items, append=false, preserveScroll=false) {
      const box = document.getElementById('messages');
      const html = items.map(m => {
        const who = m.fromMe ? 'me' : 'them';
        const img = m.imageUrl ? `<img src="${m.imageUrl}" alt="img" />` : '';
        const text = (m.text || '').replace(/[&<>]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[s]));
        const cls = m.pending ? ' pending' : '';
        const status = m.pending ? '<span class="spinner"></span> enviando...' : (m.status ? m.status.toLowerCase() : '');
        return `<div class="msg ${who}${cls}">
          ${text ? `<div>${text}</div>` : '' }
          ${img}
          <span class="time">${fmt(m.ts)}</span>
          <span class="status">${status}</span>
        </div>`;
      }).join('');
      const prevBottom = box.scrollHeight - box.scrollTop;
      if (append) box.innerHTML += html; else box.innerHTML = html;
      if (preserveScroll) {
        box.scrollTop = box.scrollHeight - prevBottom;
      } else {
        box.scrollTop = box.scrollHeight;
      }
      document.getElementById('info-count').textContent = `${S.items.length} mensagens`;
      // botão de ir para o fim
      const nearBottom = atBottom(box);
      document.getElementById('btn-scroll-bottom').style.display = nearBottom ? 'none' : 'block';
    }
    function byId(m) { return m?.messageId || m?.id || m?.tmpId || ''; }
    function reconcile(server) {
      const serverById = new Map((server || []).filter(m => byId(m)).map(m => [byId(m), m]));
      const result = [];
      const seen = new Set();
      // 1) substitui temporárias por mensagens do servidor quando possível
      for (const cur of S.items) {
        const id = byId(cur);
        if (id && serverById.has(id)) {
          const srv = serverById.get(id);
          result.push({ ...srv, fromMe: cur.fromMe ?? srv.fromMe });
          seen.add(id);
        } else {
          // mantém temporárias pendentes até que o servidor retorne
          if (cur.pending) result.push(cur);
        }
      }
      // 2) adiciona novas mensagens do servidor que não existiam localmente
      for (const msg of server) {
        const id = byId(msg);
        if (!id || !seen.has(id)) result.push(msg);
      }
      // 3) ordena por timestamp
      result.sort((a,b) => (a.ts||0) - (b.ts||0));
      return result;
    }
    async function openChat(phone) {
      S.contact = phone;
      S.beforeTs = null;
      document.getElementById('chat-title').textContent = `Conversando com ${phone}`;
      document.getElementById('btn-clear').disabled = false;
      const r = await api(`/api/chat/messages?phone=${encodeURIComponent(phone)}&limit=${S.pageSize}`);
      if (r.ok) {
        const msgs = r.data.messages || [];
        S.items = reconcile(msgs);
        drawMessages(S.items);
        if (msgs.length) S.beforeTs = msgs[0].ts;
      }
      document.getElementById('btn-load-more').disabled = !S.beforeTs;
    }
    async function loadMore() {
      if (!S.contact || !S.beforeTs || S.loadingMore) return;
      S.loadingMore = true;
      const r = await api(`/api/chat/messages?phone=${encodeURIComponent(S.contact)}&limit=${S.pageSize}&before=${S.beforeTs}`);
      S.loadingMore = false;
      if (r.ok) {
        const older = r.data.messages || [];
        if (older.length) {
          const prevLen = S.items.length;
          S.items = reconcile([...older, ...S.items]);
          S.beforeTs = older[0].ts || S.beforeTs;
          drawMessages(S.items, false, true);
        } else {
          S.beforeTs = null;
          document.getElementById('btn-load-more').disabled = true;
        }
      }
    }
    (function setupInfiniteScroll(){
      const box = document.getElementById('messages');
      box.addEventListener('scroll', () => {
        if (box.scrollTop <= 10) loadMore();
        const nearBottom = (box.scrollHeight - box.clientHeight - box.scrollTop) <= 16;
        document.getElementById('btn-scroll-bottom').style.display = nearBottom ? 'none' : 'block';
      });
    })();
    async function send() {
      if (!S.contact) return;
      const image = document.getElementById('image').value.trim();
      const text = document.getElementById('text').value;
      if (!image && !text) return;
      const tmpId = 'tmp-'+Date.now();
      const tmp = { messageId: tmpId, phone:S.contact, text, imageUrl: image||'', fromMe:true, isGroup:false, ts: Date.now(), pending:true, status:'SENDING' };
      S.items.push(tmp);
      drawMessages(S.items);
      const btn = document.getElementById('send'); btn.disabled = true; S.sending = true;
      // limpa o campo imediatamente para dar feedback de envio
      document.getElementById('text').value = '';
      const payload = image ? { phone:S.contact, image, caption:text || undefined } : { phone:S.contact, message:text };
      const url = image ? '/api/chat/send-image' : '/api/chat/send';
      // Deixa retentativas com o backend para evitar envios duplicados
      let ok=false, lastErr=null, res=null;
      try {
        const r = await api(url, { method:'POST', body: JSON.stringify(payload) });
        ok = r.ok; res = r.data; if (!ok) lastErr = r.data || r.status;
      } catch(e) {
        lastErr = String(e);
      }
      btn.disabled = false; S.sending = false;
      if (!ok) {
        tmp.pending = false;
        tmp.status = 'FAILED';
        drawMessages(S.items);
        toast(typeof lastErr==='string' ? lastErr : 'Falha ao enviar');
        addLog(`falha envio: ${JSON.stringify(lastErr)}`);
      } else {
        tmp.pending = false;
        tmp.status = res?.status || 'SENT';
        if (res?.messageId) tmp.messageId = res.messageId;
        drawMessages(S.items);
        addLog(`enviado id ${res?.messageId||'?'} status ${res?.status||'SENT'}`);
        if (image) document.getElementById('image').value = '';
      }
      const r = await api(`/api/chat/messages?phone=${encodeURIComponent(S.contact)}&limit=50`);
      if (r.ok) {
        const msgs = r.data.messages || [];
        S.items = reconcile(msgs);
        drawMessages(S.items);
      }
    }
    async function clearHistory() {
      if (!S.contact) return;
      const ok = confirm('Excluir histórico deste contato?');
      if (!ok) return;
      const r = await api(`/api/chat/messages?phone=${encodeURIComponent(S.contact)}`, { method:'DELETE' });
      if (r.ok) {
        S.items = [];
        S.beforeTs = null;
        drawMessages(S.items);
        toast('Histórico excluído');
      } else {
        toast('Falha ao excluir histórico');
      }
    }
    async function startChat() {
      const raw = document.getElementById('new-phone').value;
      const phone = normalizePhone(raw);
      if (!phone) { alert('Informe um número'); return; }
      await openChat(phone);
    }
    // SSE em tempo real + fallback polling
    try {
      const es = new EventSource('/sse');
      es.onmessage = (e) => {
        if (!e.data) return;
        try {
          const evt = JSON.parse(e.data);
          if (evt?.type === 'received') {
            if (S.contact && evt.payload?.phone === S.contact) {
              // evita duplicar pelo messageId
              const id = evt.payload?.messageId;
              if (!S.items.some(m => (m.messageId === id) && !m.pending)) {
                S.items.push({ ...evt.payload, fromMe:false });
              }
              drawMessages(S.items);
            }
          }
          if (evt?.type === 'status') {
            const ids = evt.payload?.ids || [];
            for (const id of ids) {
              const it = S.items.find(m => m.messageId === id);
              if (it) { it.pending = false; it.status = evt.payload.status; }
            }
            drawMessages(S.items);
          }
          if (evt?.type === 'delivery') {
            const id = evt.payload?.messageId;
            const it = S.items.find(m => m.messageId === id);
            if (it) { it.pending = false; it.status = 'SENT'; drawMessages(S.items); }
          }
        } catch {}
      };
    } catch {}
    setInterval(async () => {
      if (!S.contact) return;
      const r = await api(`/api/chat/messages?phone=${encodeURIComponent(S.contact)}&limit=50`);
      if (r.ok) {
        const msgs = r.data.messages || [];
        S.items = reconcile(msgs);
        drawMessages(S.items);
      }
    }, 4000);
    document.getElementById('send').addEventListener('click', send);
    document.getElementById('btn-scroll-bottom').addEventListener('click', () => {
      const box = document.getElementById('messages');
      box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
    });
    document.getElementById('toggle-log').addEventListener('change', (e) => {
      document.getElementById('log').style.display = e.target.checked ? 'block' : 'none';
    });
    document.getElementById('reload-contacts').addEventListener('click', loadContacts);
    document.getElementById('filter').addEventListener('input', loadContacts);
    document.getElementById('start-chat').addEventListener('click', startChat);
    document.getElementById('new-phone').addEventListener('keydown', e => { if (e.key === 'Enter') startChat(); });
    document.getElementById('btn-clear').addEventListener('click', clearHistory);
    document.getElementById('btn-load-more').addEventListener('click', loadMore);
    loadContacts();
  </script>
</body>
